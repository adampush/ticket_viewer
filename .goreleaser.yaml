project_name: tkv
builds:
  - main: ./cmd/bv
    binary: tkv
    ldflags:
      - -s -w
      - -X github.com/Dicklesworthstone/beads_viewer/pkg/version.version=v{{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# Homebrew tap publishing
brews:
  - name: tkv
    repository:
      owner: adampush
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/adampush/ticket_viewer
    description: "Graph-aware task management TUI for tk ticket projects"
    license: "MIT"
    install: |
      bin.install "tkv"
    test: |
      system "#{bin}/tkv", "--version"
    caveats: |
      To get started with tkv:
        1. Create tickets in your project: tk create "My task" -t task -p 2
        2. Launch the TUI: tkv

      For AI agent integration, use --robot-* flags:
        tkv --robot-triage     # Get prioritized recommendations
        tkv --robot-next       # Get single next action

# Scoop bucket publishing
scoops:
  - name: tkv
    repository:
      owner: adampush
      name: scoop-bucket
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/adampush/ticket_viewer
    description: "Graph-aware task management TUI for tk ticket projects"
    license: MIT
